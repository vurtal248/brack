<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brack — Tournament Bracket Builder</title>
  <meta name="description"
    content="Create, seed, and run single-elimination tournament brackets locally. No account required — everything saves in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;400;500;700&family=Chivo:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,500&display=swap"
    rel="stylesheet" />
  <style>
    /* ============================================================
       MINIMALIST DESIGN TOKENS
    ============================================================ */
    :root {
      color-scheme: light dark;
      --bg: light-dark(oklch(0.98 0.01 250), oklch(0.1 0.01 250));
      --bg-2: light-dark(oklch(1 0.005 250), oklch(0.13 0.01 250));
      --bg-3: light-dark(oklch(0.95 0.01 250), oklch(0.18 0.01 250));
      --border: light-dark(oklch(0.85 0.01 250), oklch(0.25 0.01 250));
      --border-hi: light-dark(oklch(0.7 0.01 250), oklch(0.35 0.01 250));
      --text: light-dark(oklch(0.2 0.01 250), oklch(0.9 0.01 250));
      --text-dim: light-dark(oklch(0.4 0.01 250), oklch(0.65 0.01 250));
      --accent: light-dark(oklch(0.3 0.01 250), oklch(0.8 0.01 250));
      --accent-dim: light-dark(oklch(0.93 0.01 250), oklch(0.2 0.01 250));
      --win: light-dark(oklch(0.15 0.01 250), oklch(0.95 0.01 250));
      --win-glow: light-dark(oklch(0.92 0.01 250), oklch(0.25 0.01 250));
      --elim-text: var(--text-dim);
      --danger: light-dark(oklch(0.45 0.02 20), oklch(0.65 0.02 20));
      --danger-dim: light-dark(oklch(0.95 0.01 20), oklch(0.18 0.01 20));
      --radius: 2px;
      --radius-lg: 4px;
      --font-display: 'Chivo', sans-serif;
      --font-mono: 'Chivo Mono', monospace;
      --transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.6;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    button {
      cursor: pointer;
      font-family: var(--font-display);
      border: none;
      background: none;
    }

    input,
    select,
    textarea {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color var(--transition);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--text);
    }

    select option {
      background: var(--bg-2);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* LAYOUT & HEADER */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 50px;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-bracket {
      color: var(--text-dim);
    }

    .logo-dot {
      display: none;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all var(--transition);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .btn:active,
    .btn-icon:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .btn-ghost {
      color: var(--text);
      border: 1px solid var(--border);
      background: var(--bg-2);
    }

    .btn-ghost:hover {
      border-color: var(--text);
    }

    .btn-danger {
      color: var(--danger);
      border: 1px solid transparent;
      background: transparent;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: var(--danger-dim);
      border-color: var(--danger);
    }

    .btn-icon {
      padding: 0.4rem;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      color: var(--text);
    }

    .btn-icon:hover {
      background: var(--bg-3);
    }

    /* HOME */
    .home-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .home-hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      gap: 1rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .home-hero-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .home-hero-title em {
      font-style: normal;
      color: var(--text-dim);
    }

    .home-hero-sub {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    .brackets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .bracket-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .bracket-card:hover {
      border-color: var(--text);
    }

    .bracket-card:active {
      transform: scale(0.98);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.2;
      flex: 1;
    }

    .card-actions {
      display: flex;
      gap: 0.25rem;
      position: relative;
      z-index: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag-pill,
    .status-pill {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .status-pill.seeding {
      background: var(--bg-3);
      color: var(--text);
    }

    .status-pill.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .status-pill.complete {
      background: var(--win-glow);
      color: var(--win);
      border-color: var(--win);
    }

    .card-info {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .card-info span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 3rem 0;
      gap: 1rem;
    }

    .empty-icon {
      display: none;
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.2rem;
      text-transform: uppercase;
    }

    .empty-state p {
      color: var(--text-dim);
      font-size: 0.85rem;
      max-width: 400px;
    }

    /* MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.1s ease;
    }

    .modal-backdrop.open {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .modal-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    /* ── SCORE MODAL TABS ── */
    .score-modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: -2rem -2rem 0;
      padding: 0 1rem;
    }

    .score-tab {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.75rem 1rem;
      color: var(--text-dim);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
    }

    .score-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .score-tab:hover:not(.active) {
      color: var(--text);
    }

    /* ── SCORE TABLE ── */
    .score-table-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 1.25rem;
      align-items: center;
      padding: 0.5rem 0.75rem;
      margin-top: 1.25rem;
    }

    .score-col-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
    }

    .score-col-label.winner-col {
      width: 52px;
    }

    .score-col-label.score-col {
      width: 80px;
    }

    .score-participant-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 1.25rem;
      align-items: center;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem;
      transition: border-color var(--transition);
    }

    .score-participant-row.is-winner {
      border-color: var(--border-hi);
      background: var(--bg-2);
    }

    .score-p-identity {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .score-p-seed {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text);
      min-width: 1rem;
      flex-shrink: 0;
    }

    .score-p-name {
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Winner checkmark */
    .score-winner-cell {
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .score-winner-check {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border-hi);
      border-radius: 50%;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .score-winner-check:hover {
      border-color: var(--text-dim);
      background: var(--bg-3);
    }

    .score-winner-check.checked {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .score-winner-check svg {
      display: none;
    }

    .score-winner-check.checked svg {
      display: block;
    }

    /* Score stepper */
    .score-stepper-cell {
      width: 80px;
    }

    .score-stepper {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
    }

    .score-stepper-val {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text);
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 0;
      width: 36px;
      min-width: 0;
      outline: none;
      -moz-appearance: textfield;
    }

    .score-stepper-val::-webkit-outer-spin-button,
    .score-stepper-val::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .score-stepper-btn {
      background: var(--bg-2);
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0 0.4rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    .score-stepper-btn:hover {
      background: var(--bg-3);
    }

    .score-stepper-btn:active {
      transform: scale(0.9);
    }

    /* Add set + footer */
    .score-add-set {
      display: flex;
      justify-content: flex-end;
      padding: 0.25rem 0;
    }

    .score-add-set-btn {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color var(--transition);
      padding: 0.25rem 0;
    }

    .score-add-set-btn:hover {
      color: var(--text);
    }

    .score-set-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
      margin-top: 0.5rem;
    }

    .score-set-pip {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.2rem 0.5rem;
      background: var(--bg-2);
      cursor: pointer;
      transition: all var(--transition);
    }

    .score-set-pip.active {
      background: var(--bg-3);
      color: var(--text);
      border-color: var(--border-hi);
    }

    /* Submit footer */
    .score-submit-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.25rem;
      gap: 1rem;
    }

    .btn-reset-scores {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color var(--transition);
    }

    .btn-reset-scores:hover {
      color: var(--danger);
    }

    .btn-submit-scores {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      flex: 1;
    }

    .btn-submit-scores:hover {
      opacity: 0.88;
    }

    .btn-submit-scores:active {
      transform: scale(0.97);
    }

    /* Save-without-winner secondary button */
    .btn-save-no-winner {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.75rem;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-save-no-winner:hover {
      color: var(--text);
      border-color: var(--border-hi);
    }

    .btn-save-no-winner:active {
      transform: scale(0.97);
    }

    /* Series-state indicator shown when a winner check is active */
    .series-status-hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      text-align: center;
      margin-top: 0.5rem;
      min-height: 1em;
    }


    .modal-footer {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* EDITOR */
    .editor-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 50px);
    }

    .editor-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .editor-bar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .editor-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
    }

    .editor-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius);
      text-transform: uppercase;
    }

    .editor-bar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .phase-track {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .phase-step {
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .phase-step.active {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .phase-step.done {
      color: var(--text-dim);
      text-decoration: line-through;
    }

    /* CANVAS */
    .bracket-canvas-wrap {
      flex: 1;
      overflow: auto;
      padding: 2rem;
      display: flex;
      align-items: flex-start;
    }

    .bracket-canvas {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-width: max-content;
    }

    .round-col {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .round-header {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 0 0.5rem 0.5rem;
      border-bottom: 1px solid var(--border);
      margin: 0 0.5rem 1rem;
    }

    .round-matches {
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-around;
    }

    .round-connector {
      width: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex-shrink: 0;
      padding-top: 1.8rem;
    }

    /* MATCH CARD */
    .match-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 180px;
      margin: 0 0.5rem;
      flex-shrink: 0;
    }

    .match-slot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      cursor: default;
      min-height: 32px;
      border-bottom: 1px solid transparent;
    }

    .match-slot:first-child {
      border-bottom: 1px solid var(--border);
    }

    .match-slot.can-pick {
      cursor: pointer;
      transition: all var(--transition);
    }

    .match-slot.can-pick:hover {
      background: var(--bg-2);
    }

    .match-slot.can-pick:active {
      transform: scale(0.98);
      background: var(--bg-3);
    }

    .match-slot.winner {
      background: var(--bg-2);
      border-left: 3px solid var(--win);
      margin-left: -1px;
      padding-left: calc(0.5rem - 2px);
    }

    .match-slot.winner .slot-name {
      color: var(--win);
      font-weight: 700;
    }

    .match-slot.winner .slot-seed {
      color: var(--win);
      opacity: 1;
    }

    .match-slot.eliminated .slot-name {
      color: var(--text-dim);
      text-decoration: line-through;
    }

    .match-slot.empty {
      opacity: 0.3;
    }

    .slot-seed {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text-dim);
      min-width: 14px;
      text-align: right;
      flex-shrink: 0;
    }

    .slot-name {
      font-size: 0.75rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .slot-win-icon {
      display: none;
    }

    .seed-input {
      background: transparent;
      border: none;
      font-size: 0.75rem;
      padding: 0;
      border-radius: 0;
    }

    .seed-input:focus {
      color: var(--text);
      background: var(--bg-3);
      padding-left: 0.25rem;
    }

    /* CHAMPION */
    .champion-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 1.5rem;
      min-width: 160px;
    }

    .champion-label {
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25rem;
      width: 100%;
      text-align: center;
    }

    .champion-card {
      background: var(--bg);
      border: 2px solid var(--win);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      min-width: 140px;
    }

    .champion-trophy {
      display: none;
    }

    .champion-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      color: var(--win);
      word-break: break-word;
    }

    .champion-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* SEEDING BOTTOM BAR */
    .seeding-hint {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .seeding-hint-text {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .seeding-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .seed-progress-wrap {
      flex: 1;
      max-width: 150px;
    }

    .seed-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      margin-bottom: 0.2rem;
    }

    .seed-progress-bar {
      height: 2px;
      background: var(--border);
    }

    .seed-progress-fill {
      height: 100%;
      background: var(--text);
      transition: width 0.2s;
    }

    /* COMPLETE BANNER */
    .complete-banner {
      display: none;
      background: var(--bg-2);
      border-bottom: 1px solid var(--win);
      padding: 0.5rem 2rem;
      align-items: center;
      justify-content: space-between;
    }

    .complete-banner.visible {
      display: flex;
    }

    .complete-banner-text {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--win);
    }

    .complete-banner-actions {
      display: flex;
      gap: 0.5rem;
    }

    /* SVG CONNECTORS */
    .bracket-svg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    .connector-line {
      fill: none;
      stroke: var(--border);
      stroke-width: 1px;
    }

    .connector-line.active-path {
      stroke: var(--win);
      stroke-width: 1px;
    }

    /* CONFIRM DIALOG */
    .confirm-dialog {
      max-width: 380px;

      font-size: 0.8rem;
      margin: 0.5rem 0 1rem;

    }

    .hidden {

    @media (max-width: 640px) {
