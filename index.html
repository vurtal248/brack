  <!-- ══════════════════════════════════════════════════════════
       APPLICATION JAVASCRIPT
  ══════════════════════════════════════════════════════════ -->
  <script>
    /* ============================================================
       STORAGE
    ============================================================ */
    const STORAGE_KEY = 'brack_brackets';

    function loadBrackets() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveBrackets(brackets) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(brackets));
    }

    function getBracket(id) {
      return loadBrackets().find(b => b.id === id) || null;
    }

    function upsertBracket(bracket) {
      const brackets = loadBrackets();
      const idx = brackets.findIndex(b => b.id === bracket.id);
      if (idx === -1) brackets.push(bracket);
      else brackets[idx] = bracket;
      saveBrackets(brackets);
    }

    function deleteBracket(id) {
      saveBrackets(loadBrackets().filter(b => b.id !== id));
    }

    /* ============================================================
       BRACKET DATA MODEL
    ============================================================ */
    function createBracket(name, count, tag, layout, include3rdPlace) {
      const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
      const participants = Array.from({ length: count }, (_, i) => ({ id: i, name: '' }));
      return {
        id,
        name: name.trim(),
        tag: tag.trim(),
        layout: layout || 'single',
        include3rdPlace: !!include3rdPlace,
        thirdPlaceMatch: include3rdPlace ? { p1Id: null, p2Id: null, winnerId: null, sets: [] } : null,
        createdAt: new Date().toISOString(),
        status: 'seeding',
        participants,        // [{id, name}]
        rounds: [],          // 2D: rounds[roundIdx][matchIdx] = { p1Id, p2Id, winnerId, sets: [{p1, p2}] }
      };
    }

    function getStandardSeeding(p2size) {
      if (p2size <= 1) return [0];
      let seeds = [0, 1];
      for (let s = 4; s <= p2size; s *= 2) {
        const next = [];
        for (let i = 0; i < seeds.length; i++) {
          next.push(seeds[i]);
          next.push(s - 1 - seeds[i]);
        }
        seeds = next;
      }
      return seeds;
    }

    function buildInitialRounds(bracket) {
      const count = bracket.participants.length;
      let p2 = 1;
      while (p2 < count) p2 *= 2;

      const totalRounds = Math.log2(p2);
      const paddedIds = bracket.participants.map(p => p.id);
      while (paddedIds.length < p2) paddedIds.push(null);

      const seedOrder = getStandardSeeding(p2);

      const round1 = [];
      for (let i = 0; i < p2; i += 2) {
        const idx1 = seedOrder[i];
        const idx2 = seedOrder[i + 1];
        const p1Id = paddedIds[idx1];
        const p2Id = paddedIds[idx2];

        let winnerId = null;
        if (p1Id == null) winnerId = p2Id;
        else if (p2Id == null) winnerId = p1Id;

        round1.push({
          p1Id, p2Id, winnerId, sets: []
        });
      }

      const rounds = [round1];
      for (let r = 1; r < totalRounds; r++) {
        const prevMatches = rounds[r - 1];
        const nextMatches = [];
        for (let m = 0; m < prevMatches.length; m += 2) {
          const m1 = prevMatches[m];
          const m2 = prevMatches[m + 1];
          const p1Id = m1.winnerId;
          const p2Id = m2.winnerId;

          let winnerId = null;
          if (p1Id != null && p2Id == null && m2.p1Id == null && m2.p2Id == null) {
            // Edge case: if an entire side is byes
          }
          // The byes from R1 should auto-fill R2.

          nextMatches.push({
            p1Id: p1Id !== undefined ? p1Id : null,
            p2Id: p2Id !== undefined ? p2Id : null,
            winnerId, sets: []
          });
        }
        rounds.push(nextMatches);
      }
      return rounds;
    }

    function updateBracketStatus(bracket) {
      if (bracket.status === 'seeding') return bracket;
      const lastRound = bracket.rounds[bracket.rounds.length - 1];
      if (lastRound && lastRound.length === 1 && lastRound[0].winnerId != null) {
        if (bracket.include3rdPlace && bracket.thirdPlaceMatch) {
          if (bracket.thirdPlaceMatch.winnerId != null) {
            bracket.status = 'complete';
          } else {
            bracket.status = 'active';
          }
        } else {
          bracket.status = 'complete';
        }
      } else {
        bracket.status = 'active';
      }
      return bracket;
    }

    function cascadeByes(bracket) {
      let changed = true;
      while (changed) {
        changed = false;
        for (let r = 0; r < bracket.rounds.length; r++) {
          for (let m = 0; m < bracket.rounds[r].length; m++) {
            const match = bracket.rounds[r][m];
            if (match.winnerId == null) {
              if (match.p1Id != null && match.p2Id == null) {
                // Determine if p2 slot is genuinely empty because of byes, or just unresolved
                if (r === 0 || isSlotDead(bracket, r, m, 1)) {
                  changed = true;
                  bracket = advanceWinner(bracket, r, m, match.p1Id);
                }
              }
              else if (match.p2Id != null && match.p1Id == null) {
                if (r === 0 || isSlotDead(bracket, r, m, 0)) {
                  changed = true;
                  bracket = advanceWinner(bracket, r, m, match.p2Id);
                }
              }
            }
          }
        }
      }
      return bracket;
    }

    function startBracket(bracket) {
      bracket.status = 'active';
      bracket.rounds = buildInitialRounds(bracket);

      bracket = cascadeByes(bracket);
      bracket = updateBracketStatus(bracket);

      return bracket;
    }

    function isSlotDead(bracket, roundIdx, matchIdx, slotIdx) {
      if (roundIdx === 0) return true;
      const prevRoundIdx = roundIdx - 1;
      const prevMatchIdx = matchIdx * 2 + slotIdx;
      const prevMatch = bracket.rounds[prevRoundIdx][prevMatchIdx];

      // If the previous match hasn't been played yet (has live participants but no winner),
      // this slot is NOT dead — it's just waiting for a result.
      if (prevMatch.p1Id != null || prevMatch.p2Id != null) {
        // There are participants; the slot is only dead if the match is done
        // but its winner somehow won't reach here — that can't happen normally.
        // Treat as live (not dead) unless the match already has a winner and
        // that winner went somewhere else. In normal single-elimination that
        // never happens, so if there are participants the slot is NOT dead.
        return false;
      }

      // Both participants in the feeder match are null — trace further back
      // to see if any earlier match could still feed someone in (recursive).
      if (prevRoundIdx === 0) return true;
      // Check whether both feeder slots of the feeder match are also dead
      return isSlotDead(bracket, prevRoundIdx, prevMatchIdx, 0) &&
        isSlotDead(bracket, prevRoundIdx, prevMatchIdx, 1);
    }

    /**
     * After a winner is picked in match (roundIdx, matchIdx),
     * advance them to the next round.
     */
    function advanceWinner(bracket, roundIdx, matchIdx, winnerId) {
      const match = bracket.rounds[roundIdx][matchIdx];
      const oldWinnerId = match.winnerId;

      match.winnerId = winnerId;

      if (oldWinnerId !== winnerId) {
        let r = roundIdx + 1;
        let m = Math.floor(matchIdx / 2);
        let isP1 = matchIdx % 2 === 0;

        if (r < bracket.rounds.length) {
          // Place winner into next-round match
          if (isP1) bracket.rounds[r][m].p1Id = winnerId;
          else bracket.rounds[r][m].p2Id = winnerId;

          // Handle 3rd place mapping if this was a semi-final match
          if (bracket.include3rdPlace && bracket.thirdPlaceMatch && r === bracket.rounds.length - 1) {
            let loserId = null;
            if (winnerId != null) {
              loserId = (winnerId === match.p1Id) ? match.p2Id : match.p1Id;
            }
            if (isP1) bracket.thirdPlaceMatch.p1Id = loserId;
            else bracket.thirdPlaceMatch.p2Id = loserId;
            bracket.thirdPlaceMatch.winnerId = null; // reset if changed
          }

          // Clear old winner downstream if they had advanced
          let currR = r;
          let currM = m;
          while (currR < bracket.rounds.length) {
            let currMatch = bracket.rounds[currR][currM];
            if (oldWinnerId != null && currMatch.winnerId === oldWinnerId) {
              currMatch.winnerId = null;

              let nextR = currR + 1;
              if (nextR < bracket.rounds.length) {
                let nextM = Math.floor(currM / 2);
                let nextIsP1 = currM % 2 === 0;
                if (nextIsP1) bracket.rounds[nextR][nextM].p1Id = null;
                else bracket.rounds[nextR][nextM].p2Id = null;

                currR = nextR;
                currM = nextM;
              } else {
                break;
              }
            } else {
              break;
            }
          }
        }
      }

      return bracket;
    }

    function getChampion(bracket) {
      const lastRound = bracket.rounds[bracket.rounds.length - 1];
      if (!lastRound || lastRound.length !== 1) return null;
      const finalMatch = lastRound[0];
      if (finalMatch.winnerId == null) return null;
      return bracket.participants.find(p => p.id === finalMatch.winnerId) || null;
    }

    function resetBracket(bracket) {
      bracket.status = 'seeding';
      bracket.rounds = [];
      if (bracket.include3rdPlace) {
        bracket.thirdPlaceMatch = { p1Id: null, p2Id: null, winnerId: null, sets: [] };
      }
      return bracket;
    }

    /* ============================================================
       THEME TOGGLE
    ============================================================ */
    function setTheme(isDark) {
      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      localStorage.setItem('bracket-theme', isDark ? 'dark' : 'light');
      document.getElementById('icon-sun').style.display = isDark ? 'block' : 'none';
      document.getElementById('icon-moon').style.display = isDark ? 'none' : 'block';
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('bracket-theme');
      if (savedTheme === 'dark') setTheme(true);
      else if (savedTheme === 'light') setTheme(false);
      else setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    document.getElementById('btn-theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.style.colorScheme === 'dark';
      setTheme(!isDark);
    });

    initTheme();

    /* ============================================================
       ROUTER / PAGE SWITCHER
    ============================================================ */
    let currentPage = 'home';
    let currentBracketId = null;

    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      currentPage = page;
      renderHeaderActions();
    }

    function renderHeaderActions() {
      const el = document.getElementById('header-actions');
      if (currentPage === 'home') {
        el.innerHTML = '';
      } else {
        el.innerHTML = '';
      }
    }

    /* ============================================================
       HOME PAGE
    ============================================================ */
    function renderHome() {
      showPage('home');
      const grid = document.getElementById('brackets-grid');
      const brackets = loadBrackets();

      if (brackets.length === 0) {
        grid.innerHTML = `
        <div class="empty-state" role="listitem">
          <div class="empty-icon" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="2" y="8" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="20" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="26" y="14" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="12" x2="14" y2="14" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="24" x2="14" y2="22" stroke="currentColor" stroke-width="1.5"/><line x1="24" y1="18" x2="26" y2="18" stroke="currentColor" stroke-width="1.5"/></svg>
          </div>
          <h2>No Brackets Yet</h2>
          <p>Create your first bracket to get started. Single-elimination, fully local — no account needed.</p>
          <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            New Bracket
          </button>
        </div>`;
        return;
      }

      grid.innerHTML = brackets.map(b => {
        const created = new Date(b.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const count = b.participants.length;
        return `
        <article class="bracket-card" role="listitem" tabindex="0"
          data-id="${b.id}"
          onclick="openEditor('${b.id}')"
          onkeydown="if(event.key==='Enter'||event.key===' ')openEditor('${b.id}')"
          aria-label="Open ${escHtml(b.name)} bracket">
          <div class="card-top">
            <div class="card-name">${escHtml(b.name)}</div>
            <div class="card-actions">
              <button class="btn-icon btn-danger" onclick="event.stopPropagation();confirmDelete('${b.id}')" aria-label="Delete ${escHtml(b.name)}">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 3h12M5 3V2h4v1M2 3l1 9h8l1-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <div class="card-meta">
            <span class="status-pill ${b.status}">${b.status === 'seeding' ? 'Seeding' : b.status === 'active' ? 'In Progress' : '✓ Complete'}</span>
            ${b.tag ? `<span class="tag-pill">${escHtml(b.tag)}</span>` : ''}
          </div>
          <div class="card-info">
            <span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.5" fill="currentColor"/></svg>
              ${count} participants
            </span>
            <span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              ${created}
            </span>
          </div>
        </article>`;
      }).join('');
    }

    /* ============================================================
       CREATE MODAL
    ============================================================ */
    function openCreateModal() {
      document.getElementById('input-bracket-name').value = '';
      document.getElementById('input-participant-count').value = '8';
      document.getElementById('input-bracket-tag').value = '';
      document.getElementById('input-bracket-layout').value = 'single';
      const thirdPlaceEl = document.getElementById('input-bracket-3rd');
      if (thirdPlaceEl) thirdPlaceEl.checked = false;
      document.getElementById('create-modal').classList.add('open');
      setTimeout(() => document.getElementById('input-bracket-name').focus(), 100);
    }

    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
    }

    document.getElementById('btn-new-bracket').addEventListener('click', openCreateModal);
    document.getElementById('btn-close-create-modal').addEventListener('click', closeCreateModal);
    document.getElementById('btn-cancel-create').addEventListener('click', closeCreateModal);

    document.getElementById('btn-confirm-create').addEventListener('click', () => {
      const name = document.getElementById('input-bracket-name').value.trim();
      if (!name) {
        document.getElementById('input-bracket-name').focus();
        document.getElementById('input-bracket-name').style.borderColor = 'var(--danger)';
        setTimeout(() => document.getElementById('input-bracket-name').style.borderColor = '', 1500);
        return;
      }

      let count = parseInt(document.getElementById('input-participant-count').value);
      if (isNaN(count) || count < 3) count = 3;

      const layout = document.getElementById('input-bracket-layout').value;
      const tag = document.getElementById('input-bracket-tag').value.trim();
      const thirdPlaceEl = document.getElementById('input-bracket-3rd');
      const include3rdPlace = thirdPlaceEl ? thirdPlaceEl.checked : false;
      const bracket = createBracket(name, count, tag, layout, include3rdPlace);
      upsertBracket(bracket);
      closeCreateModal();
      openEditor(bracket.id);
    });

    // Close on backdrop click
    document.getElementById('create-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeCreateModal();
    });

    // Enter key to submit
    document.getElementById('input-bracket-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-confirm-create').click();
    });

    /* ============================================================
       DELETE MODAL
    ============================================================ */
    let pendingDeleteId = null;

    function confirmDelete(id) {
      pendingDeleteId = id;
      const b = getBracket(id);
      document.getElementById('delete-modal-text').textContent =
        `"${b ? b.name : 'This bracket'}" will be permanently deleted. This cannot be undone.`;
      document.getElementById('delete-modal').classList.add('open');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      pendingDeleteId = null;
    }

    document.getElementById('btn-close-delete-modal').addEventListener('click', closeDeleteModal);
    document.getElementById('btn-cancel-delete').addEventListener('click', closeDeleteModal);
    document.getElementById('delete-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDeleteModal();
    });

    document.getElementById('btn-confirm-delete').addEventListener('click', () => {
      if (pendingDeleteId) {
        deleteBracket(pendingDeleteId);
        closeDeleteModal();
        renderHome();
      }
    });

    /* ============================================================
       EDITOR
    ============================================================ */
    function openEditor(id) {
      currentBracketId = id;
      showPage('editor');
      renderEditor();
    }

    function renderEditor() {
      const bracket = getBracket(currentBracketId);
      if (!bracket) { renderHome(); return; }

      // header info
      document.getElementById('editor-title').textContent = bracket.name;
      const tagEl = document.getElementById('editor-tag');
      if (bracket.tag) { tagEl.textContent = bracket.tag; tagEl.style.display = ''; }
      else tagEl.style.display = 'none';

      // phase indicators
      updatePhaseUI(bracket.status);

      // complete banner
      const banner = document.getElementById('complete-banner');
      banner.classList.toggle('visible', bracket.status === 'complete');

      // seeding hint bar
      document.getElementById('seeding-hint').style.display =
        bracket.status === 'seeding' ? '' : 'none';

      // render the canvas
      renderBracketCanvas(bracket);
    }

    function updatePhaseUI(status) {
      const steps = ['seeding', 'active', 'complete'];
      const statusMap = { seeding: 0, active: 1, complete: 2 };
      const current = statusMap[status] ?? 0;
      steps.forEach((s, i) => {
        const el = document.getElementById(`phase-${s}`);
        el.classList.remove('active', 'done');
        if (i === current) el.classList.add('active');
        else if (i < current) el.classList.add('done');
      });
    }

    /* ── BRACKET CANVAS RENDERER ── */
    function renderBracketCanvas(bracket) {
      const canvas = document.getElementById('bracket-canvas');
      canvas.innerHTML = '';

      if (bracket.status === 'seeding') {
        renderSeedingCanvas(bracket, canvas);
      } else {
        renderActiveCanvas(bracket, canvas);
      }
    }

    function getParticipantName(bracket, id) {
      if (id == null) return '';
      const p = bracket.participants.find(p => p.id === id);
      return p ? p.name : '';
    }

    /* ── SEEDING CANVAS ── */
    function renderSeedingCanvas(bracket, canvas) {
      const count = bracket.participants.length;
      const matchCount = count / 2;

      const col = document.createElement('div');
      col.className = 'round-col';
      col.innerHTML = `<div class="round-header">Seeding — Fill Names</div>`;

      const matchesWrap = document.createElement('div');
      matchesWrap.className = 'round-matches';
      matchesWrap.style.gap = '0.75rem';

      // Standard seeding: 1v8, 2v7, etc.
      for (let i = 0; i < matchCount; i++) {
        const topSeed = i + 1;
        const btmSeed = count - i;
        const topP = bracket.participants[i];
        const btmP = bracket.participants[count - 1 - i];

        const card = document.createElement('div');
        card.className = 'match-card';
        card.style.margin = '0.25rem 0.5rem';
        card.innerHTML = `
        <div class="match-slot" data-pid="${topP.id}" data-match-idx="${i}" data-slot="0">
          <span class="slot-seed">${topSeed}</span>
          <input class="seed-input" type="text" placeholder="Enter name…"
            value="${escHtml(topP.name)}"
            maxlength="30"
            data-pid="${topP.id}"
            aria-label="Seed ${topSeed} participant name" />
        </div>
        <div class="match-slot" data-pid="${btmP.id}" data-match-idx="${i}" data-slot="1">
          <span class="slot-seed">${btmSeed}</span>
          <input class="seed-input" type="text" placeholder="Enter name…"
            value="${escHtml(btmP.name)}"
            maxlength="30"
            data-pid="${btmP.id}"
            aria-label="Seed ${btmSeed} participant name" />
        </div>`;
        matchesWrap.appendChild(card);
      }

      col.appendChild(matchesWrap);
      canvas.appendChild(col);

      // Attach input listeners
      canvas.querySelectorAll('.seed-input').forEach(input => {
        input.addEventListener('input', () => {
          const bid = currentBracketId;
          const pid = parseInt(input.dataset.pid);
          const b = getBracket(bid);
          const p = b.participants.find(pp => pp.id === pid);
          if (p) p.name = input.value;
          upsertBracket(b);
          updateSeedProgress(b);
        });
      });

      updateSeedProgress(bracket);
    }

    function updateSeedProgress(bracket) {
      const filled = bracket.participants.filter(p => p.name.trim()).length;
      const total = bracket.participants.length;
      const pct = total ? (filled / total) * 100 : 0;
      document.getElementById('seed-progress-fill').style.width = `${pct}%`;
      document.getElementById('seed-progress-label-val').textContent = `${filled} / ${total}`;
    }

    /* ── ACTIVE/COMPLETE CANVAS ── */
    function renderActiveCanvas(bracket, canvas) {
      const totalRounds = bracket.rounds.length;
      canvas.innerHTML = '';

      if (bracket.layout === 'double' && totalRounds >= 2) {
        // Double-sided layout
        const leftSide = document.createElement('div');
        leftSide.style.display = 'flex';
        const rightSide = document.createElement('div');
        rightSide.style.display = 'flex';
        rightSide.style.flexDirection = 'row-reverse';

        for (let r = 0; r < totalRounds - 1; r++) {
          const roundMatches = bracket.rounds[r];
          const half = roundMatches.length / 2;

          // Left column
          leftSide.appendChild(buildRoundCol(bracket, r, totalRounds, 0, half, 'L'));
          if (r < totalRounds - 2) {
            leftSide.appendChild(buildConnectorCol(r, 'L'));
          }

          // Right column
          rightSide.appendChild(buildRoundCol(bracket, r, totalRounds, half, roundMatches.length, 'R'));
          if (r < totalRounds - 2) {
            rightSide.appendChild(buildConnectorCol(r, 'R'));
          }
        }

        // Final match + champion in the center
        const centerCol = document.createElement('div');
        centerCol.className = 'champion-col';
        centerCol.style.padding = '0 1rem';

        const finalMatchesWrap = document.createElement('div');
        finalMatchesWrap.className = 'round-matches';
        finalMatchesWrap.style.gap = '1rem';
        const finalMatch = bracket.rounds[totalRounds - 1][0];
        const finalEl = buildMatchCard(bracket, finalMatch, totalRounds - 1, 0, 'C');
        finalMatchesWrap.appendChild(finalEl);

        centerCol.innerHTML = `<div class="round-header" style="text-align:center;width:100%;">Final</div>`;
        centerCol.appendChild(finalMatchesWrap);

        // Left to Final Connector
        const leftFinalConn = buildConnectorCol(totalRounds - 2, 'C-L');
        // Right to Final Connector
        const rightFinalConn = buildConnectorCol(totalRounds - 2, 'C-R');

        // Assemble
        canvas.appendChild(leftSide);
        canvas.appendChild(leftFinalConn);
        canvas.appendChild(centerCol);
        canvas.appendChild(rightFinalConn);
        canvas.appendChild(rightSide);

        // Champion below final
        const champion = getChampion(bracket);
        const champBox = document.createElement('div');
        champBox.style.marginTop = '2rem';
        champBox.style.width = '100%';
        champBox.style.display = 'flex';
        champBox.style.flexDirection = 'column';
        champBox.style.alignItems = 'center';
        if (champion) {
          champBox.innerHTML = `
          <div class="champion-card" role="status" aria-live="polite">
            <div class="champion-trophy" aria-hidden="true">🏆</div>
            <div class="champion-name">${escHtml(champion.name)}</div>
            <div class="champion-sub">Winner</div>
          </div>`;
        } else {
          champBox.innerHTML = `
          <div class="champion-card" style="opacity:0.35;border-color:var(--border);box-shadow:none;">
            <div class="champion-trophy" aria-hidden="true">?</div>
            <div class="champion-name" style="color:var(--text-dim)">TBD</div>
            <div class="champion-sub">Pick winners to advance</div>
          </div>`;
        }

        if (bracket.include3rdPlace && bracket.thirdPlaceMatch && totalRounds >= 2) {
          const thirdMatchWrapper = document.createElement('div');
          thirdMatchWrapper.style.marginTop = '2rem';
          thirdMatchWrapper.style.width = '100%';
          thirdMatchWrapper.style.display = 'flex';
          thirdMatchWrapper.style.flexDirection = 'column';
          thirdMatchWrapper.style.alignItems = 'center';
          thirdMatchWrapper.innerHTML = `<div class="champion-label" style="text-align:center;width:100%;margin-bottom:0.5rem;border:none;">3rd Place</div>`;
          const thirdMatchEl = buildMatchCard(bracket, bracket.thirdPlaceMatch, '3rd', 0, '3rd');
          thirdMatchEl.style.margin = '0';
          thirdMatchWrapper.appendChild(thirdMatchEl);
          champBox.appendChild(thirdMatchWrapper);
        }

        centerCol.appendChild(champBox);

      } else {
        // Single-sided layout
        for (let r = 0; r < totalRounds; r++) {
          const roundMatches = bracket.rounds[r];
          canvas.appendChild(buildRoundCol(bracket, r, totalRounds, 0, roundMatches.length, 'S'));

          if (r < totalRounds - 1) {
            canvas.appendChild(buildConnectorCol(r, 'S'));
          }
        }

        // Champion column
        const champion = getChampion(bracket);
        const champCol = document.createElement('div');
        champCol.className = 'champion-col';
        if (champion) {
          champCol.innerHTML = `
          <div class="champion-label">Champion</div>
          <div class="champion-card" role="status" aria-live="polite">
            <div class="champion-trophy" aria-hidden="true">🏆</div>
            <div class="champion-name">${escHtml(champion.name)}</div>
            <div class="champion-sub">Winner</div>
          </div>`;
        } else {
          champCol.innerHTML = `
          <div class="champion-label">Champion</div>
          <div class="champion-card" style="opacity:0.35;border-color:var(--border);box-shadow:none;">
            <div class="champion-trophy" aria-hidden="true">?</div>
            <div class="champion-name" style="color:var(--text-dim)">TBD</div>
            <div class="champion-sub">Pick winners to advance</div>
          </div>`;
        }

        if (bracket.include3rdPlace && bracket.thirdPlaceMatch && totalRounds >= 2) {
          const thirdMatchWrapper = document.createElement('div');
          thirdMatchWrapper.style.marginTop = '2rem';
          thirdMatchWrapper.style.width = '100%';
          thirdMatchWrapper.innerHTML = `<div class="champion-label" style="text-align:center;width:100%;margin-bottom:0.5rem;border:none;">3rd Place</div>`;
          const thirdMatchEl = buildMatchCard(bracket, bracket.thirdPlaceMatch, '3rd', 0, 'S');
          thirdMatchWrapper.appendChild(thirdMatchEl);
          champCol.appendChild(thirdMatchWrapper);
        }

        canvas.appendChild(champCol);
      }

      requestAnimationFrame(() => drawConnectors(canvas, bracket));
    }

    function buildRoundCol(bracket, r, totalRounds, startIdx, endIdx, prefix) {
      const col = document.createElement('div');
      col.className = 'round-col';
      const roundName = getRoundName(r, totalRounds);
      col.innerHTML = `<div class="round-header">${roundName}</div>`;

      const matchesWrap = document.createElement('div');
      matchesWrap.className = 'round-matches';
      matchesWrap.style.gap = '0';

      for (let mIdx = startIdx; mIdx < endIdx; mIdx++) {
        const match = bracket.rounds[r][mIdx];
        const wrapper = document.createElement('div');
        wrapper.style.flex = '1';
        wrapper.style.display = 'flex';
        wrapper.style.alignItems = 'center';
        wrapper.style.justifyContent = 'center';

        // Bye: only in R1 (r===0) where exactly one slot is null.
        // Later rounds with one null slot are just waiting for a winner.
        const isBye = r === 0 && (match.p1Id == null) !== (match.p2Id == null);
        if (isBye) {
          // Invisible spacer — same width as a match card so connectors align
          const spacer = document.createElement('div');
          spacer.style.width = '180px';
          spacer.style.margin = '0.35rem 0.5rem';
          spacer.setAttribute('aria-hidden', 'true');
          spacer.id = `match-${prefix}-${r}-${mIdx}`;
          wrapper.appendChild(spacer);
        } else {
          const matchEl = buildMatchCard(bracket, match, r, mIdx, prefix);
          wrapper.appendChild(matchEl);
        }

        matchesWrap.appendChild(wrapper);
      }
      col.appendChild(matchesWrap);
      return col;
    }

    function buildMatchCard(bracket, match, roundIdx, matchIdx, prefix = 'S') {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.id = `match-${prefix}-${roundIdx}-${matchIdx}`;
      card.style.margin = '0.35rem 0.5rem';

      const canPick = (bracket.status === 'active' || bracket.status === 'complete') && match.p1Id != null && match.p2Id != null;

      if (canPick) {
        card.style.cursor = 'pointer';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', 'Score this match');
        card.addEventListener('click', () => openScoreModal(roundIdx, matchIdx));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openScoreModal(roundIdx, matchIdx); }
        });
        card.onmouseover = () => { card.style.borderColor = 'var(--text)'; };
        card.onmouseout = () => { card.style.borderColor = 'var(--border)'; };
      }

      [match.p1Id, match.p2Id].forEach((pid, slotIdx) => {
        const name = getParticipantName(bracket, pid);
        const isWinner = match.winnerId === pid && pid != null;
        const isLoser = match.winnerId != null && match.winnerId !== pid && pid != null;
        const isEmpty = pid == null;

        const slot = document.createElement('div');
        slot.className = 'match-slot';
        let seedNum = '';
        if (roundIdx === 0 && pid != null) {
          const pIdx = bracket.participants.findIndex(p => p.id === pid);
          seedNum = pIdx !== -1 ? (pIdx + 1) : '';
        }

        if (isWinner) slot.classList.add('winner');
        if (isLoser) slot.classList.add('eliminated');
        if (isEmpty) slot.classList.add('empty');

        let setsText = '';
        if (match.sets && match.sets.length > 0) {
          let scoreString = match.sets.map(s => slotIdx === 0 ? s.p1 : s.p2).join(' | ');
          setsText = `<span style="font-size:0.65rem; color:var(--text-dim); margin-left: auto; font-weight:700;">${scoreString}</span>`;
        }

        slot.innerHTML = `
        <span class="slot-seed">${seedNum || ''}</span>
        <span class="slot-name">${isEmpty ? '—' : (name || '<em style="color:var(--text-dim);font-style:italic">unnamed</em>')}</span>
        ${setsText}
        <svg class="slot-win-icon" style="display:${isWinner ? 'block' : 'none'}; opacity:0.5; width:12px; height:12px;" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

        card.appendChild(slot);
      });

      return card;
    }

    /* ── SCORE MODAL ── */
    let currentScoreMatch = null;
    let matchSets = [];
    let userOverriddenWinner = null;
    let currentSetIdx = 0;

    function calculateAutoWinner(sets) {
      let p1Wins = 0, p2Wins = 0;
      sets.forEach(s => {
        const p1 = parseFloat(s.p1);
        const p2 = parseFloat(s.p2);
        if (!isNaN(p1) && !isNaN(p2)) {
          if (p1 > p2) p1Wins++;
          else if (p2 > p1) p2Wins++;
        }
      });
      if (p1Wins > p2Wins) return 'p1';
      if (p2Wins > p1Wins) return 'p2';
      return null;
    }

    function updateWinnerCheckmarks(autoUpdate = false) {
      if (autoUpdate) {
        userOverriddenWinner = null;
      }
      let winnerToSelect = userOverriddenWinner || calculateAutoWinner(matchSets);
      document.getElementById('score-p1-radio').checked = (winnerToSelect === 'p1');
      document.getElementById('score-p2-radio').checked = (winnerToSelect === 'p2');
    }

    document.getElementById('score-p1-radio').addEventListener('change', () => {
      if (document.getElementById('score-p1-radio').checked) {
        userOverriddenWinner = 'p1';
        document.getElementById('score-p2-radio').checked = false;
      } else {
        userOverriddenWinner = null;
        updateWinnerCheckmarks();
      }
    });

    document.getElementById('score-p2-radio').addEventListener('change', () => {
      if (document.getElementById('score-p2-radio').checked) {
        userOverriddenWinner = 'p2';
        document.getElementById('score-p1-radio').checked = false;
      } else {
        userOverriddenWinner = null;
        updateWinnerCheckmarks();
      }
    });

    function openScoreModal(r, m) {
      let bracket = getBracket(currentBracketId);
      let match = (r === '3rd') ? bracket.thirdPlaceMatch : bracket.rounds[r][m];
      currentScoreMatch = { r, m };
      currentSetIdx = 0;
      matchSets = JSON.parse(JSON.stringify(match.sets || []));
      if (matchSets.length === 0) {
        matchSets.push({ p1: '', p2: '' });
      }

      const p1Name = getParticipantName(bracket, match.p1Id);
      const p2Name = getParticipantName(bracket, match.p2Id);
      // Store names in hidden elements for renderSets to read
      document.getElementById('score-p1-name').textContent = p1Name;
      document.getElementById('score-p2-name').textContent = p2Name;

      if (match.winnerId != null) {
        if (match.winnerId === match.p1Id) userOverriddenWinner = 'p1';
        else if (match.winnerId === match.p2Id) userOverriddenWinner = 'p2';
      } else {
        userOverriddenWinner = null;
      }

      // Sync hidden checkboxes before renderSets reads them
      document.getElementById('score-p1-radio').checked = (userOverriddenWinner === 'p1');
      document.getElementById('score-p2-radio').checked = (userOverriddenWinner === 'p2');

      renderSets();
      document.getElementById('score-modal').classList.add('open');
    }

    function closeScoreModal() {
      document.getElementById('score-modal').classList.remove('open');
      currentScoreMatch = null;
    }

    document.getElementById('btn-close-score-modal').addEventListener('click', closeScoreModal);
    document.getElementById('score-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeScoreModal();
    });

    document.getElementById('btn-add-set').addEventListener('click', () => {
      matchSets.push({ p1: '', p2: '' });
      currentSetIdx = matchSets.length - 1;
      renderSets();
    });

    document.getElementById('btn-reset-scores').addEventListener('click', () => {
      matchSets = [{ p1: '', p2: '' }];
      currentSetIdx = 0;
      userOverriddenWinner = null;
      document.getElementById('score-p1-radio').checked = false;
      document.getElementById('score-p2-radio').checked = false;
      renderSets();
    });


    function renderSets() {
      // Clamp active set index
      if (currentSetIdx >= matchSets.length) currentSetIdx = matchSets.length - 1;
      if (currentSetIdx < 0) currentSetIdx = 0;

      const bracket = getBracket(currentBracketId);
      const match = (currentScoreMatch.r === '3rd') ? bracket.thirdPlaceMatch : bracket.rounds[currentScoreMatch.r][currentScoreMatch.m];
      const p1Name = document.getElementById('score-p1-name').textContent;
      const p2Name = document.getElementById('score-p2-name').textContent;
      const p1Seed = (() => {
        if (currentScoreMatch.r === 0 && match.p1Id != null) {
          const pIdx = bracket.participants.findIndex(p => p.id === match.p1Id);
          return pIdx !== -1 ? pIdx + 1 : '';
        }
        return '';
      })();
      const p2Seed = (() => {
        if (currentScoreMatch.r === 0 && match.p2Id != null) {
          const pIdx = bracket.participants.findIndex(p => p.id === match.p2Id);
          return pIdx !== -1 ? pIdx + 1 : '';
        }
        return '';
      })();

      const s = matchSets[currentSetIdx] || { p1: '', p2: '' };
      const p1Checked = document.getElementById('score-p1-radio').checked;
      const p2Checked = document.getElementById('score-p2-radio').checked;

      const c = document.getElementById('score-sets-container');
      c.innerHTML = `
        <div class="score-participant-row${p1Checked ? ' is-winner' : ''}" id="score-row-p1">
          <div class="score-p-identity">
            <span class="score-p-seed">${p1Seed}</span>
            <span class="score-p-name">${escHtml(p1Name)}</span>
          </div>
          <div class="score-winner-cell">
            <div class="score-winner-check${p1Checked ? ' checked' : ''}" id="score-check-p1" role="checkbox"
              aria-checked="${p1Checked}" tabindex="0" aria-label="Select ${escHtml(p1Name)} as winner">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="score-stepper-cell">
            <div class="score-stepper">
              <button class="score-stepper-btn" data-target="p1" data-dir="-1" aria-label="Decrease score">−</button>
              <input type="number" class="score-stepper-val" id="stepper-p1-val"
                min="0" value="${s.p1 !== '' ? s.p1 : 0}" data-idx="${currentSetIdx}" data-which="p1" />
              <button class="score-stepper-btn" data-target="p1" data-dir="1" aria-label="Increase score">+</button>
            </div>
          </div>
        </div>
        <div class="score-participant-row${p2Checked ? ' is-winner' : ''}" id="score-row-p2">
          <div class="score-p-identity">
            <span class="score-p-seed">${p2Seed}</span>
            <span class="score-p-name">${escHtml(p2Name)}</span>
          </div>
          <div class="score-winner-cell">
            <div class="score-winner-check${p2Checked ? ' checked' : ''}" id="score-check-p2" role="checkbox"
              aria-checked="${p2Checked}" tabindex="0" aria-label="Select ${escHtml(p2Name)} as winner">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="score-stepper-cell">
            <div class="score-stepper">
              <button class="score-stepper-btn" data-target="p2" data-dir="-1" aria-label="Decrease score">−</button>
              <input type="number" class="score-stepper-val" id="stepper-p2-val"
                min="0" value="${s.p2 !== '' ? s.p2 : 0}" data-idx="${currentSetIdx}" data-which="p2" />
              <button class="score-stepper-btn" data-target="p2" data-dir="1" aria-label="Increase score">+</button>
            </div>
          </div>
        </div>
      `;

      // Set pip tabs
      const tabsEl = document.getElementById('score-set-tabs');
      tabsEl.innerHTML = matchSets.map((_, i) =>
        `<button class="score-set-pip${i === currentSetIdx ? ' active' : ''}" data-set-idx="${i}" aria-label="Set ${i + 1}">Set ${i + 1}</button>`
      ).join('');

      // Pip click
      tabsEl.querySelectorAll('.score-set-pip').forEach(pip => {
        pip.addEventListener('click', () => {
          currentSetIdx = parseInt(pip.dataset.setIdx);
          renderSets();
        });
      });

      // Series status hint — shows p1 wins vs p2 wins across all sets
      (() => {
        let p1w = 0, p2w = 0;
        matchSets.forEach(s => {
          const a = parseFloat(s.p1), b = parseFloat(s.p2);
          if (!isNaN(a) && !isNaN(b) && (a !== 0 || b !== 0)) {
            if (a > b) p1w++;
            else if (b > a) p2w++;
          }
        });
        const hint = document.getElementById('series-status-hint');
        if (p1w > 0 || p2w > 0) {
          const p1n = document.getElementById('score-p1-name').textContent || 'P1';
          const p2n = document.getElementById('score-p2-name').textContent || 'P2';
          hint.textContent = `Series: ${escHtml(p1n)} ${p1w} – ${p2w} ${escHtml(p2n)}`;
        } else {
          hint.textContent = '';
        }
      })();

      // Stepper buttons
      c.querySelectorAll('.score-stepper-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const which = btn.dataset.target;
          const dir = parseInt(btn.dataset.dir);
          const inp = c.querySelector(`#stepper-${which}-val`);
          const cur = parseInt(inp.value) || 0;
          const nv = Math.max(0, cur + dir);
          inp.value = nv;
          matchSets[currentSetIdx][which] = nv;
          updateWinnerCheckmarks(true);
          renderSets();
        });
      });

      // Direct input
      c.querySelectorAll('.score-stepper-val').forEach(inp => {
        inp.addEventListener('input', () => {
          matchSets[currentSetIdx][inp.dataset.which] = inp.value;
          updateWinnerCheckmarks(true);
        });
      });

      // Winner check buttons
      c.querySelector('#score-check-p1').addEventListener('click', () => {
        userOverriddenWinner = document.getElementById('score-p1-radio').checked ? null : 'p1';
        document.getElementById('score-p1-radio').checked = (userOverriddenWinner === 'p1');
        document.getElementById('score-p2-radio').checked = false;
        renderSets();
      });
      c.querySelector('#score-check-p1').addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); c.querySelector('#score-check-p1').click(); }
      });

      c.querySelector('#score-check-p2').addEventListener('click', () => {
        userOverriddenWinner = document.getElementById('score-p2-radio').checked ? null : 'p2';
        document.getElementById('score-p2-radio').checked = (userOverriddenWinner === 'p2');
        document.getElementById('score-p1-radio').checked = false;
        renderSets();
      });
      c.querySelector('#score-check-p2').addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); c.querySelector('#score-check-p2').click(); }
      });
    }

    // "Save Only" — persist scores without declaring a winner (mid-series support)
    document.getElementById('btn-save-no-winner').addEventListener('click', () => {
      if (!currentScoreMatch) return;
      let bracket = getBracket(currentBracketId);
      const match = (currentScoreMatch.r === '3rd') ? bracket.thirdPlaceMatch : bracket.rounds[currentScoreMatch.r][currentScoreMatch.m];

      // Persist the sets as-is; do NOT touch winnerId or advance anyone
      const cleanSets = matchSets.map(s => ({ p1: s.p1 !== '' ? parseFloat(s.p1) : 0, p2: s.p2 !== '' ? parseFloat(s.p2) : 0 }));
      match.sets = cleanSets;

      upsertBracket(bracket);
      closeScoreModal();
      renderEditor();
    });

    // "Declare Winner" — requires a winner to be checked; advances bracket
    document.getElementById('btn-save-score').addEventListener('click', () => {
      if (!currentScoreMatch) return;
      let bracket = getBracket(currentBracketId);
      const match = (currentScoreMatch.r === '3rd') ? bracket.thirdPlaceMatch : bracket.rounds[currentScoreMatch.r][currentScoreMatch.m];

      const cleanSets = matchSets.map(s => ({ p1: s.p1 !== '' ? parseFloat(s.p1) : 0, p2: s.p2 !== '' ? parseFloat(s.p2) : 0 }));
      match.sets = cleanSets;

      let winnerId = null;
      if (document.getElementById('score-p1-radio').checked) {
        winnerId = match.p1Id;
      } else if (document.getElementById('score-p2-radio').checked) {
        winnerId = match.p2Id;
      } else {
        // No winner checked — prompt user to either pick a winner or use Save Only
        const hint = document.getElementById('series-status-hint');
        hint.textContent = '⚠ Check a winner above, or use Save Only for mid-series.';
        hint.style.color = 'var(--danger)';
        setTimeout(() => { hint.style.color = ''; renderSets(); }, 2500);
        return;
      }

      if (currentScoreMatch.r === '3rd') {
        match.winnerId = winnerId;
      } else {
        bracket = advanceWinner(bracket, currentScoreMatch.r, currentScoreMatch.m, winnerId);
        bracket = cascadeByes(bracket);
      }

      bracket = updateBracketStatus(bracket);

      upsertBracket(bracket);
      closeScoreModal();
      renderEditor();
    });

    function getRoundName(roundIdx, totalRounds) {
      const remaining = totalRounds - roundIdx;
      if (remaining === 1) return 'Final';
      if (remaining === 2) return 'Semi-Finals';
      if (remaining === 3) return 'Quarter-Finals';
      return `Round ${roundIdx + 1}`;
    }

    /* ── CONNECTOR LINES (SVG) ── */
    function buildConnectorCol(roundIdx, prefix) {
      const div = document.createElement('div');
      div.className = 'round-connector';
      div.id = `connector-${prefix}-${roundIdx}`;
      div.style.position = 'relative';
      return div;
    }

    function drawConnectors(canvas, bracket) {
      canvas.querySelectorAll('.bracket-svg').forEach(s => s.remove());
      const totalRounds = bracket.rounds.length;

      if (bracket.layout === 'double' && totalRounds >= 2) {
        for (let r = 0; r < totalRounds - 1; r++) {
          const half = bracket.rounds[r].length / 2;
          if (r < totalRounds - 2) {
            drawSideConnectors(bracket, r, 0, half, 'L', 'L', false);
            drawSideConnectors(bracket, r, half, bracket.rounds[r].length, 'R', 'R', true);
          } else {
            drawToCenterConnectors(bracket, r, 0, 1, 'L', 'C', false);
            drawToCenterConnectors(bracket, r, 1, 2, 'R', 'C', true);
          }
        }
      } else {
        for (let r = 0; r < totalRounds - 1; r++) {
          drawSideConnectors(bracket, r, 0, bracket.rounds[r].length, 'S', 'S', false);
        }
      }
    }

    function drawSideConnectors(bracket, r, startM, endM, srcPre, dstPre, isReversed) {
      const connectorCol = document.getElementById(`connector-${srcPre}-${r}`);
      if (!connectorCol) return;
      const colRect = connectorCol.getBoundingClientRect();

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.classList.add('bracket-svg');
      svg.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;`;
      connectorCol.appendChild(svg);

      for (let m = startM; m < endM; m += 2) {
        // In double sided right half, nextMatchIdx is shifted
        let nextMatchIdx = Math.floor(m / 2);

        let topM = bracket.rounds[r][m];
        let btmM = bracket.rounds[r][m + 1] || topM;

        // Detect bye slots: only in R1 (r===0), exactly one of p1Id/p2Id is null.
        // In later rounds a single null slot just means a winner hasn't been
        // decided yet — that is NOT a bye.
        const topIsBye = r === 0 && topM && (topM.p1Id == null) !== (topM.p2Id == null);
        const btmIsBye = r === 0 && btmM && (btmM.p1Id == null) !== (btmM.p2Id == null);

        const topMatchEl = document.getElementById(`match-${srcPre}-${r}-${m}`);
        const btmMatchEl = document.getElementById(`match-${srcPre}-${r}-${m + 1}`);
        const nextMatchEl = document.getElementById(`match-${dstPre}-${r + 1}-${nextMatchIdx}`);

        if (!nextMatchEl) continue;

        const nxtRect = nextMatchEl.getBoundingClientRect();
        const xEnd = isReversed
          ? nxtRect.right - colRect.left
          : nxtRect.left - colRect.left;
        const xMid = colRect.width / 2;
        const yDst = nxtRect.top + nxtRect.height / 2 - colRect.top;

        const nextExists = bracket.rounds[r + 1][nextMatchIdx]?.p1Id != null || bracket.rounds[r + 1][nextMatchIdx]?.p2Id != null;

        // Both real matches — standard two-arm connector
        if (!topIsBye && !btmIsBye && topMatchEl && btmMatchEl) {
          const topRect = topMatchEl.getBoundingClientRect();
          const btmRect = btmMatchEl.getBoundingClientRect();
          const x0top = isReversed ? topRect.left - colRect.left : topRect.right - colRect.left;
          const x0btm = isReversed ? btmRect.left - colRect.left : btmRect.right - colRect.left;

          const y1 = topRect.top + topRect.height / 2 - colRect.top;
          const y2 = btmRect.top + btmRect.height / 2 - colRect.top;
          const yMid = (y1 + y2) / 2;

          const topWon = topM?.winnerId != null;
          const btmWon = btmM?.winnerId != null;
          const cssVar = topWon || btmWon ? 'var(--win)' : 'var(--border)';
          const sw = topWon || btmWon ? '1.5' : '1';

          // Rounded-corner bracket arms:
          // travel horizontal, Q-arc around the 90° elbow, drop vertical to yMid, exit horizontal
          const maxR = Math.min(8, xMid);
          const r = Math.min(maxR, Math.abs(yMid - y1));
          const cx = isReversed ? xMid + r : xMid - r; // approach elbow from arm side
          const topVDir = yMid >= y1 ? r : -r;          // which way the top arm bends vertically
          const btmVDir = yMid <= y2 ? -r : r;          // bottom arm bends the other way
          // Top arm
          makePath(svg, `M ${x0top} ${y1} H ${cx} Q ${xMid} ${y1} ${xMid} ${y1 + topVDir} V ${yMid}`, cssVar, sw, topWon);
          // Bottom arm
          makePath(svg, `M ${x0btm} ${y2} H ${cx} Q ${xMid} ${y2} ${xMid} ${y2 + btmVDir} V ${yMid}`, cssVar, sw, btmWon);
          // Shared horizontal exit from spine midpoint to next card
          makePath(svg, `M ${xMid} ${yMid} H ${xEnd}`, cssVar, sw, nextExists);

        } else {
          // One (or both) is a bye — draw a single straight line from the real
          // match card directly to the next-round card, skipping the merge arm.
          const realMatchEl = topIsBye ? btmMatchEl : topMatchEl;
          const realM = topIsBye ? btmM : topM;
          if (!realMatchEl) {
            // Both are byes — nothing to draw
            continue;
          }
          const realRect = realMatchEl.getBoundingClientRect();
          const x0 = isReversed ? realRect.left - colRect.left : realRect.right - colRect.left;
          const y1 = realRect.top + realRect.height / 2 - colRect.top;

          const won = realM?.winnerId != null;
          const cssVar = won ? 'var(--win)' : 'var(--border)';
          const sw = won ? '1.5' : '1';

          // Bye: two rounded elbows — horizontal → arc → vertical → arc → horizontal
          const maxR = Math.min(8, xMid);
          const r = Math.min(maxR, Math.abs(yDst - y1) / 2);
          const vDir = yDst >= y1 ? 1 : -1;
          const c1x = isReversed ? xMid + r : xMid - r; // elbow 1: arm bends into spine
          const c2x = isReversed ? xMid - r : xMid + r; // elbow 2: spine bends toward exit
          makePath(svg,
            `M ${x0} ${y1} H ${c1x} Q ${xMid} ${y1} ${xMid} ${y1 + vDir * r}` +
            ` V ${yDst - vDir * r} Q ${xMid} ${yDst} ${c2x} ${yDst} H ${xEnd}`,
            cssVar, sw, nextExists);
        }
      }
    }

    function drawToCenterConnectors(bracket, r, m, limit, srcPre, dstPre, isReversed) {
      const connectorCol = document.getElementById(`connector-C-${srcPre}`);
      if (!connectorCol) return;
      const colRect = connectorCol.getBoundingClientRect();

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.classList.add('bracket-svg');
      svg.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;`;
      connectorCol.appendChild(svg);

      const topMatchEl = document.getElementById(`match-${srcPre}-${r}-${m}`);
      const nextMatchEl = document.getElementById(`match-${dstPre}-${r + 1}-0`); // Final

      if (!topMatchEl || !nextMatchEl) return;

      const topRect = topMatchEl.getBoundingClientRect();
      const nxtRect = nextMatchEl.getBoundingClientRect();

      let x0 = topRect.right - colRect.left;
      let xEnd = nxtRect.left - colRect.left;
      if (isReversed) {
        x0 = topRect.left - colRect.left;
        xEnd = nxtRect.right - colRect.left;
      }

      const y1 = topRect.top + topRect.height / 2 - colRect.top;
      const yEnd = nxtRect.top + nxtRect.height / 2 - colRect.top;

      const topWon = bracket.rounds[r][m]?.winnerId != null;

      const cssVar = topWon ? 'var(--win)' : 'var(--border)';
      const sw = topWon ? '1.5' : '1';

      // Semi-final → final: two rounded elbows
      const xMid = colRect.width / 2;
      const maxR = Math.min(8, xMid);
      const cr = Math.min(maxR, Math.abs(yEnd - y1) / 2);
      const vDir = yEnd >= y1 ? 1 : -1;
      const c1x = isReversed ? xMid + cr : xMid - cr;
      const c2x = isReversed ? xMid - cr : xMid + cr;
      makePath(svg,
        `M ${x0} ${y1} H ${c1x} Q ${xMid} ${y1} ${xMid} ${y1 + vDir * cr}` +
        ` V ${yEnd - vDir * cr} Q ${xMid} ${yEnd} ${c2x} ${yEnd} H ${xEnd}`,
        cssVar, sw, topWon);
    }

    function makePath(svg, d, stroke, strokeWidth, active) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', active ? 'var(--win)' : stroke);
      path.setAttribute('stroke-width', strokeWidth);
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);
    }

    /* ── SEEDING CONTROLS ── */
    document.getElementById('btn-randomize').addEventListener('click', () => {
      const b = getBracket(currentBracketId);
      // Fisher-Yates shuffle on participants array
      for (let i = b.participants.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b.participants[i], b.participants[j]] = [b.participants[j], b.participants[i]];
      }
      upsertBracket(b);
      renderEditor();
    });

    document.getElementById('btn-start-bracket').addEventListener('click', () => {
      let b = getBracket(currentBracketId);
      // Fill empty names with defaults
      b.participants.forEach((p, i) => {
        if (!p.name.trim()) p.name = `Participant ${i + 1}`;
      });
      b = startBracket(b);
      upsertBracket(b);
      renderEditor();
    });

    /* ── BACK / NAVIGATION ── */
    document.getElementById('btn-back-home').addEventListener('click', () => {
      currentBracketId = null;
      renderHome();
    });

    document.getElementById('btn-complete-home').addEventListener('click', () => {
      currentBracketId = null;
      renderHome();
    });

    document.getElementById('logo-home-btn').addEventListener('click', () => {
      if (currentPage === 'home') return;
      currentBracketId = null;
      renderHome();
    });
    document.getElementById('logo-home-btn').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('logo-home-btn').click(); }
    });

    /* ── RESET ── */
    document.getElementById('btn-reset-bracket').addEventListener('click', () => {
      let b = getBracket(currentBracketId);
      b = resetBracket(b);
      // clear participant names? — no, keep them, just reset rounds
      upsertBracket(b);
      renderEditor();
    });

    /* ============================================================
       UTILS
    ============================================================ */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ============================================================
       KEYBOARD: ESC closes modals
    ============================================================ */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeCreateModal();
        closeDeleteModal();
      }
    });

    /* ============================================================
       DRAG TO PAN
    ============================================================ */
    const canvasWrap = document.getElementById('bracket-canvas-wrap');
    let isDown = false;
    let startX;
    let startY;
    let scrollLeft;
    let scrollTop;

    canvasWrap.addEventListener('mousedown', (e) => {
      if (e.target.closest('button, input, select, .match-card, .champion-card, .round-header')) return;
      isDown = true;
      canvasWrap.style.cursor = 'grabbing';
      startX = e.pageX - canvasWrap.offsetLeft;
      startY = e.pageY - canvasWrap.offsetTop;
      scrollLeft = canvasWrap.scrollLeft;
      scrollTop = canvasWrap.scrollTop;
    });

    window.addEventListener('mouseup', () => {
      if (isDown) {
        isDown = false;
        canvasWrap.style.cursor = '';
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - canvasWrap.offsetLeft;
      const y = e.pageY - canvasWrap.offsetTop;
      const walkX = (x - startX); // Adjust multiplier if needed
      const walkY = (y - startY);
      canvasWrap.scrollLeft = scrollLeft - walkX;
      canvasWrap.scrollTop = scrollTop - walkY;
    });

    /* ============================================================
       INIT
    ============================================================ */
    renderHome();
  </script>
</body>

</html>
